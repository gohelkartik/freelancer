<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join WorkWave Freelance Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #064e3b;
            --accent-green: #10b981;
            --text-white: #ffffff;
            --text-gray: #6b7280;
            --light-gray: #f3f4f6;
            --bg-light: #f9fafb;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: #1f2937;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: white;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
            text-decoration: none;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--accent-green);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #4b5563;
            font-weight: 500;
            font-size: 16px;
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-green);
        }

        .auth-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .join-btn {
            border: 2px solid var(--accent-green);
            padding: 8px 20px;
            border-radius: 8px;
            color: var(--accent-green) !important;
            font-weight: 600 !important;
        }

        .join-btn:hover {
            background: var(--accent-green);
            color: white !important;
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--primary-dark);
        }

        .signup-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .signup-card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signup-header h1 {
            font-size: 28px;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: var(--bg-light);
            border-color: var(--accent-green);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--text-gray);
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider:before { margin-right: 15px; }
        .divider:after { margin-left: 15px; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
        }

        .input-icon input, .input-icon select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            outline: none;
            transition: var(--transition);
            font-size: 15px;
        }

        .input-icon input:focus, .input-icon select:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary-dark);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--accent-green);
            transform: translateY(-2px);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .footer-text a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: white;
                padding: 20px;
                box-shadow: 0 10px 10px rgba(0,0,0,0.1);
                gap: 20px;
            }
            .nav-links.active { display: flex; }
            .auth-group { width: 100%; flex-direction: column; }
            .join-btn { width: 100%; text-align: center; }
            .social-auth { grid-template-columns: 1fr; }
            .signup-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="container nav-container">
        <div class="logo">
            <a href="index.html">WorkWave<span>.</span></a>
        </div>
        <nav class="nav-links" id="nav-list">
            <a href="index.html">Home</a>
            <a href="browse.html">Find Work</a>
            <a href="how.html">How it Works</a>
            <a href="index.html#services">Services</a>
            <div class="auth-group">
                <a href="login.html">log IN</a>
                <a href="signup.html" class="join-btn">Join Now</a>
            </div>
        </nav>
        <div class="menu-toggle" id="mobile-menu">
            <i class="fas fa-bars"></i>
        </div>
    </div>
</header>

<div class="signup-wrapper">
    <div class="signup-card">
        <div class="signup-header">
            <h1>Create an Account</h1>
            <p>Join the WorkWave community today</p>
        </div>

        <div class="social-auth">
            <button class="social-btn" onclick="socialLogin('Google')">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="social-btn" onclick="socialLogin('Apple')">
                <i class="fab fa-apple"></i> Apple
            </button>
        </div>

        <div class="divider">or use your email</div>

        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullname" placeholder="name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>I want to...</label>
                <div class="input-icon">
                    <i class="fas fa-briefcase"></i>
                    <select id="role" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="freelancer">Work as a Freelancer</option>
                        <option value="client">Hire Freelancers</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Min. 8 characters" minlength="8" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="login.html">Sign In</a>
        </p>
    </div>
</div>

<script>
    const mobileMenu = document.getElementById('mobile-menu');
    const navList = document.getElementById('nav-list');
    
    mobileMenu.addEventListener('click', () => {
        navList.classList.toggle('active');
        const icon = mobileMenu.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-times');
    });

    const signupForm = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');

    signupForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const originalText = submitBtn.innerText;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        submitBtn.style.pointerEvents = 'none';
        submitBtn.style.opacity = '0.7';

        setTimeout(() => {
            alert('Registration Successful! Redirecting to login...');
            window.location.href = 'login.html';
        }, 1500);
    });

    function socialLogin(platform) {
        alert(`Connecting to ${platform}... This would normally redirect to the ${platform} authentication page.`);
    }

    document.querySelectorAll('.nav-links a').forEach(link => {
        if (link.href === window.location.href) {
            link.classList.add('active');
        }
    });
</script>

</body>
</html>
